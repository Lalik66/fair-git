<?xml version="1.0" encoding="UTF-8"?>
<!--
  Foxie — Marketplace Fox Mascot
  ================================
  Groups:
    #fox-shadow       — ground shadow
    #fox-tail         — tail (animate rotation from transform-origin bottom-left)
    #fox-body         — main torso + belly
    #fox-arms         — both arms (use #fox-arm-left / #fox-arm-right individually)
    #fox-head         — head base
    #fox-ears         — both ears (use #fox-ear-left / #fox-ear-right individually)
    #fox-markings     — white face muzzle + chest markings
    #fox-eyes-happy   — open happy eyes (show by default)
    #fox-eyes-cool    — sunglasses layer (hidden by default)
    #fox-eyes-sleepy  — half-closed sleepy eyes (hidden by default)
    #fox-eyes-surprised — wide surprised eyes (hidden by default)
    #fox-nose         — nose
    #fox-mouth        — mouth (swap paths per emotion)
    #fox-cheeks       — rosy cheeks
    #fox-costume      — seasonal costume overlay (empty, add children per season)

  CSS custom properties on :root for easy theming:
    --fox-primary     : main orange
    --fox-dark        : darker orange / shadow
    --fox-light       : warm cream
    --fox-inner-ear   : pink inner ear
    --fox-eye         : pupil color
    --fox-nose        : nose color
    --fox-cheek       : blush color

  Usage:
    Swap emotion: hide/show #fox-eyes-* and adjust #fox-mouth path "d"
    Wave: rotate #fox-arm-right around its base with CSS @keyframes
    Tail wag: rotate #fox-tail around transform-origin 30px 10px (its root)
    Seasonal: inject costume SVG children into #fox-costume group
-->
<svg
  id="foxie"
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 200 240"
  width="200"
  height="240"
  role="img"
  aria-label="Foxie the fox mascot"
>

  <defs>
    <style>
      :root {
        --fox-primary    : #FF6B35;
        --fox-dark       : #D94F1A;
        --fox-light      : #FFF0DC;
        --fox-inner-ear  : #FFB38A;
        --fox-eye        : #1E1206;
        --fox-nose       : #1E1206;
        --fox-cheek      : rgba(255, 140, 90, 0.45);
      }

      /* Convenience classes so JS/CSS can recolor with one variable swap */
      .c-primary  { fill: var(--fox-primary); }
      .c-dark     { fill: var(--fox-dark); }
      .c-light    { fill: var(--fox-light); }
      .c-ear-in   { fill: var(--fox-inner-ear); }
      .c-eye      { fill: var(--fox-eye); }
      .c-nose     { fill: var(--fox-nose); }
      .c-cheek    { fill: var(--fox-cheek); }
      .c-white    { fill: #ffffff; }
      .c-black    { fill: #1E1206; }

      /* Emotion layer visibility — toggle with JS */
      #fox-eyes-happy     { display: block; }
      #fox-eyes-cool      { display: none; }
      #fox-eyes-sleepy    { display: none; }
      #fox-eyes-surprised { display: none; }
      #fox-costume        { display: block; }
    </style>

    <!-- Radial gradient for tail tip -->
    <radialGradient id="tailGrad" cx="75%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="#FFF0DC"/>
      <stop offset="100%" stop-color="#FFD4A8"/>
    </radialGradient>

    <!-- Subtle body shading -->
    <radialGradient id="bodyGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#FF7D4A"/>
      <stop offset="100%" stop-color="#D94F1A"/>
    </radialGradient>

    <!-- Head shading -->
    <radialGradient id="headGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#FF7D4A"/>
      <stop offset="100%" stop-color="#D94F1A"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════════════════════════════════
       SHADOW  (ground ellipse, sits beneath all)
  ═══════════════════════════════════════════ -->
  <g id="fox-shadow">
    <ellipse cx="100" cy="232" rx="52" ry="7" fill="#D94F1A" opacity="0.18"/>
  </g>

  <!-- ═══════════════════════════════════════════
       TAIL  — rotate around point (62, 185) to wag
       transform-origin in CSS: 62px 185px
  ═══════════════════════════════════════════ -->
  <g id="fox-tail" style="transform-origin: 62px 185px;">
    <!-- Outer tail shape -->
    <path
      d="M62 185
         C 30 175, 5 155, 12 128
         C 18 105, 42 100, 55 112
         C 65 122, 62 140, 58 155
         C 54 168, 56 178, 62 185 Z"
      fill="url(#tailGrad)"
      stroke="var(--fox-primary)" stroke-width="1.5" stroke-linejoin="round"
    />
    <!-- Main tail orange body -->
    <path
      d="M62 185
         C 38 177, 18 158, 24 133
         C 29 112, 48 108, 58 118
         C 67 127, 63 143, 60 158
         C 57 170, 59 180, 62 185 Z"
      class="c-primary"
    />
    <!-- White fluffy tip -->
    <ellipse cx="20" cy="122" rx="14" ry="18"
      transform="rotate(-20 20 122)"
      fill="#FFF0DC"/>
    <ellipse cx="22" cy="124" rx="9" ry="12"
      transform="rotate(-20 22 124)"
      fill="white"/>
  </g>

  <!-- ═══════════════════════════════════════════
       BODY  — torso
  ═══════════════════════════════════════════ -->
  <g id="fox-body">
    <!-- Main body -->
    <ellipse cx="100" cy="175" rx="42" ry="48" fill="url(#bodyGrad)"/>
    <!-- Chest / belly patch -->
    <ellipse cx="100" cy="185" rx="26" ry="32" class="c-light"/>
  </g>

  <!-- ═══════════════════════════════════════════
       ARMS  — animate #fox-arm-right to wave
       transform-origin of right arm: 132px 148px
  ═══════════════════════════════════════════ -->
  <g id="fox-arms">
    <!-- Left arm -->
    <g id="fox-arm-left">
      <ellipse cx="68" cy="175" rx="14" ry="10"
        transform="rotate(30 68 175)"
        class="c-primary"/>
      <!-- paw -->
      <ellipse cx="60" cy="183" rx="10" ry="8"
        class="c-primary"/>
      <ellipse cx="57" cy="184" rx="4" ry="3" class="c-dark" opacity="0.4"/>
      <ellipse cx="61" cy="187" rx="4" ry="3" class="c-dark" opacity="0.4"/>
      <ellipse cx="65" cy="184" rx="4" ry="3" class="c-dark" opacity="0.4"/>
    </g>

    <!-- Right arm — WAVE THIS with rotate(-40deg) from its base -->
    <g id="fox-arm-right" style="transform-origin: 132px 148px;">
      <ellipse cx="133" cy="175" rx="14" ry="10"
        transform="rotate(-30 133 175)"
        class="c-primary"/>
      <!-- paw -->
      <ellipse cx="141" cy="183" rx="10" ry="8"
        class="c-primary"/>
      <ellipse cx="138" cy="184" rx="4" ry="3" class="c-dark" opacity="0.4"/>
      <ellipse cx="142" cy="187" rx="4" ry="3" class="c-dark" opacity="0.4"/>
      <ellipse cx="146" cy="184" rx="4" ry="3" class="c-dark" opacity="0.4"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       HEAD
  ═══════════════════════════════════════════ -->
  <g id="fox-head">
    <ellipse cx="100" cy="105" rx="52" ry="50" fill="url(#headGrad)"/>
  </g>

  <!-- ═══════════════════════════════════════════
       EARS  — animate #fox-ear-left / right for peek
       transform-origin of left ear:  70px 62px
       transform-origin of right ear: 130px 62px
  ═══════════════════════════════════════════ -->
  <g id="fox-ears">
    <g id="fox-ear-left" style="transform-origin: 70px 62px;">
      <!-- Outer ear -->
      <polygon points="58,68  44,28  82,58" class="c-primary"/>
      <!-- Inner ear -->
      <polygon points="62,65  52,36  76,58" class="c-ear-in"/>
    </g>
    <g id="fox-ear-right" style="transform-origin: 130px 62px;">
      <!-- Outer ear -->
      <polygon points="142,68  156,28  118,58" class="c-primary"/>
      <!-- Inner ear -->
      <polygon points="138,65  148,36  124,58" class="c-ear-in"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       FACE MARKINGS — white muzzle + face patches
  ═══════════════════════════════════════════ -->
  <g id="fox-markings">
    <!-- White muzzle -->
    <ellipse cx="100" cy="118" rx="30" ry="24" class="c-light"/>
    <!-- Forehead white patch -->
    <path d="M80 80 Q100 70 120 80 Q112 95 100 92 Q88 95 80 80 Z" class="c-light" opacity="0.6"/>
  </g>

  <!-- ═══════════════════════════════════════════
       EYES — HAPPY  (default visible)
  ═══════════════════════════════════════════ -->
  <g id="fox-eyes-happy">
    <!-- Left eye -->
    <ellipse cx="82"  cy="100" rx="9" ry="10" class="c-white"/>
    <circle   cx="83"  cy="101" r="6"          class="c-eye"/>
    <circle   cx="85"  cy="98"  r="2"          fill="white"/>
    <!-- Right eye -->
    <ellipse cx="118" cy="100" rx="9" ry="10" class="c-white"/>
    <circle   cx="119" cy="101" r="6"          class="c-eye"/>
    <circle   cx="121" cy="98"  r="2"          fill="white"/>
    <!-- Happy eyebrows -->
    <path d="M74 91 Q82 86 90 91"
      stroke="var(--fox-dark)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M110 91 Q118 86 126 91"
      stroke="var(--fox-dark)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ═══════════════════════════════════════════
       EYES — COOL (sunglasses, hidden by default)
  ═══════════════════════════════════════════ -->
  <g id="fox-eyes-cool">
    <!-- Left lens -->
    <rect x="68" y="93" width="26" height="18" rx="9" fill="#1A1A2E"/>
    <!-- Right lens -->
    <rect x="106" y="93" width="26" height="18" rx="9" fill="#1A1A2E"/>
    <!-- Bridge -->
    <rect x="94" y="99" width="12" height="4" rx="2" fill="#1A1A2E"/>
    <!-- Arms -->
    <rect x="48" y="98" width="20" height="4" rx="2" fill="#1A1A2E"/>
    <rect x="132" y="98" width="20" height="4" rx="2" fill="#1A1A2E"/>
    <!-- Shine -->
    <ellipse cx="78"  cy="98" rx="7" ry="4" fill="white" opacity="0.18"/>
    <ellipse cx="116" cy="98" rx="7" ry="4" fill="white" opacity="0.18"/>
  </g>

  <!-- ═══════════════════════════════════════════
       EYES — SLEEPY (hidden by default)
  ═══════════════════════════════════════════ -->
  <g id="fox-eyes-sleepy">
    <!-- Left eye — half closed -->
    <ellipse cx="82"  cy="102" rx="9" ry="7" class="c-white"/>
    <ellipse cx="82"  cy="98"  rx="9" ry="5" class="c-primary"/><!-- lid -->
    <ellipse cx="83"  cy="103" r="4"          class="c-eye"/>
    <!-- Right eye — half closed -->
    <ellipse cx="118" cy="102" rx="9" ry="7" class="c-white"/>
    <ellipse cx="118" cy="98"  rx="9" ry="5" class="c-primary"/><!-- lid -->
    <ellipse cx="119" cy="103" r="4"          class="c-eye"/>
    <!-- droopy brows -->
    <path d="M74 95 Q82 93 90 95"
      stroke="var(--fox-dark)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M110 95 Q118 93 126 95"
      stroke="var(--fox-dark)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Z Z Z -->
    <text x="128" y="76"  font-family="sans-serif" font-weight="bold" font-size="9"  fill="#B0B0CC">z</text>
    <text x="136" y="66"  font-family="sans-serif" font-weight="bold" font-size="12" fill="#B0B0CC">z</text>
    <text x="145" y="54"  font-family="sans-serif" font-weight="bold" font-size="16" fill="#B0B0CC">Z</text>
  </g>

  <!-- ═══════════════════════════════════════════
       EYES — SURPRISED (hidden by default)
  ═══════════════════════════════════════════ -->
  <g id="fox-eyes-surprised">
    <!-- Left eye — wide open -->
    <ellipse cx="82"  cy="99" rx="11" ry="13" class="c-white"/>
    <circle   cx="83"  cy="101" r="7"          class="c-eye"/>
    <circle   cx="85"  cy="98"  r="2.5"        fill="white"/>
    <!-- Right eye — wide open -->
    <ellipse cx="118" cy="99" rx="11" ry="13" class="c-white"/>
    <circle   cx="119" cy="101" r="7"          class="c-eye"/>
    <circle   cx="121" cy="98"  r="2.5"        fill="white"/>
    <!-- raised brows -->
    <path d="M72 85 Q82 79 92 85"
      stroke="var(--fox-dark)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M108 85 Q118 79 128 85"
      stroke="var(--fox-dark)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ═══════════════════════════════════════════
       NOSE
  ═══════════════════════════════════════════ -->
  <g id="fox-nose">
    <ellipse cx="100" cy="114" rx="7" ry="5" class="c-nose"/>
    <!-- nose highlight -->
    <ellipse cx="98"  cy="112" rx="2.5" ry="1.5" fill="white" opacity="0.4"/>
  </g>

  <!-- ═══════════════════════════════════════════
       MOUTH  — swap the path `d` per emotion:
         happy    : "M88 122 Q100 133 112 122"
         surprised: ellipse, see group below
         neutral  : "M92 124 Q100 128 108 124"
         smirk    : "M90 123 Q100 130 110 126"
  ═══════════════════════════════════════════ -->
  <g id="fox-mouth">
    <!-- Default: happy open smile -->
    <path id="fox-mouth-path"
      d="M88 122 Q100 134 112 122"
      stroke="var(--fox-dark)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- Tongue (hidden by default, show on happy/excited) -->
    <g id="fox-tongue" display="none">
      <ellipse cx="100" cy="129" rx="7" ry="5" fill="#E84A6A"/>
      <line x1="100" y1="124" x2="100" y2="134"
        stroke="#C93558" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <!-- Surprised open-O (hidden by default) -->
    <g id="fox-mouth-surprised" display="none">
      <ellipse cx="100" cy="127" rx="9" ry="11" fill="#1E1206"/>
      <ellipse cx="100" cy="128" rx="6"  ry="7"  fill="#C93558"/>
    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       CHEEKS — rosy blush
  ═══════════════════════════════════════════ -->
  <g id="fox-cheeks">
    <ellipse cx="68"  cy="118" rx="12" ry="8" class="c-cheek"/>
    <ellipse cx="132" cy="118" rx="12" ry="8" class="c-cheek"/>
  </g>

  <!-- ═══════════════════════════════════════════
       COSTUME  — inject seasonal children here
       Examples:
         Halloween : <g id="costume-halloween">pumpkin hat paths</g>
         Christmas : <g id="costume-christmas">scarf + bell paths</g>
         Spring    : <g id="costume-spring">flower crown paths</g>
         Fair      : <g id="costume-fair">bowtie path</g>
  ═══════════════════════════════════════════ -->
  <g id="fox-costume">
    <!-- Empty by default — inject costume SVG here at runtime -->
  </g>

</svg>
